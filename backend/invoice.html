<script>

async function checkCustomerExists() {

  const customerId = document.getElementById("customer_id").value.trim();
  if(customerId === "") return false;

  try {
    const bookingRes = await fetch("http://localhost:3001/api/bookings");
    const bookings = await bookingRes.json();

    const booking = bookings.find(b => Number(b.customer_id) === Number(customerId));

    if(!booking){
      alert("❌ Customer ID does not exist in Booking Dashboard");
      customer_id.value = "";
      booking_id.value = "";
      // removed payment_id.value = "";
      customer_id.focus();
      return false;
    }

    booking_id.value = booking.booking_id;

    // Removed payment check here

    return true;   // ⭐ SUCCESS

  } catch(err){
    alert("Server not running!");
    return false;
  }
}

//////////////////////////////////////////////////
// 🔴 VALIDATE BEFORE SAVE (UPDATED)
//////////////////////////////////////////////////
async function validateAndSaveInvoice() {

  const invoiceNo  = document.getElementById("invoice_number").value.trim();
  const customerId = document.getElementById("customer_id").value.trim();
  const bookingId  = document.getElementById("booking_id").value.trim();
  // Removed paymentId variable
  const amount     = document.getElementById("invoice_amount").value.trim();
  const statusVal  = document.getElementById("status").value.trim();

  // Removed paymentId check here
  if(!invoiceNo || !customerId || !bookingId || !amount || !statusVal){
    alert("⚠️ Please fill all fields");
    return;
  }

  try {
    const bookingRes = await fetch("http://localhost:3001/api/bookings");
    const bookings = await bookingRes.json();

    // Removed payment fetching and validation

    const booking = bookings.find(b => b.booking_id == bookingId);

    if(!booking){ alert("❌ Booking ID not found"); return; }
    if(Number(booking.customer_id) !== Number(customerId)){ alert("❌ Customer mismatch Booking"); return; }

    saveInvoice();

  } catch(err){ 
    alert("Server not running!"); 
  }
}
//////////////////////////////////////////////////
// 🟢 SAVE INVOICE (UNCHANGED EXCEPT REMOVAL OF payment_id)
//////////////////////////////////////////////////
 function saveInvoice() {
  console.log("🔥 Save Invoice clicked");

  const data = {
  invoice_number: document.getElementById("invoice_number").value,
  customer_id: document.getElementById("customer_id").value,
  booking_id: document.getElementById("booking_id").value,
  // Removed payment_id from data
  invoice_amount: document.getElementById("invoice_amount").value,
  status: document.getElementById("status").value
};

  fetch("http://localhost:3001/saveInvoice", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => alert("✅ Invoice Saved Successfully"))
  .catch(err => {
    console.error(err);
    alert("❌ Failed to save invoice");
  });
}

async function loadCompletedPayments(){
  const table = document.getElementById("readyInvoiceTable");
  while(table.rows.length > 1){ table.deleteRow(1); }
  try{
    const bookingRes = await fetch("http://localhost:3001/api/bookings");
    const bookings = await bookingRes.json();
    const paymentRes = await fetch("http://localhost:3001/api/payments");
    const payments = await paymentRes.json();
    payments.forEach(payment=>{
      if(Number(payment.remaining_amount) === 0){
        const booking = bookings.find(b => b.customer_id == payment.customer_id);
        const row = table.insertRow();
        row.insertCell(0).innerText = payment.customer_id;
        row.insertCell(1).innerText = booking ? booking.customer_name : "N/A";
        // Removed payment_id cell
        row.insertCell(2).innerHTML = "<b style='color:orange'>Pending</b>";
        row.insertCell(3).innerHTML =
  `<button onclick="editInvoice('${payment.customer_id}')">Edit</button>`;
      }
    });
  }catch(err){ console.error(err); }
}

document.getElementById("logoutBtn").onclick = function(e){

async function editInvoice(customerId){

  window.scrollTo({ top: 0, behavior: "smooth" });

  try{

   const res = await fetch(`http://localhost:3001/api/invoice-by-customer/${customerId}`);

    // ⭐ THIS LINE FIXES EVERYTHING
    if(res.status === 404){
      document.getElementById("customer_id").value = customerId;
      alert("No previous invoice found. Create new invoice.");
      return;
    }

    if(res.status !== 200){
      alert("Server error while fetching invoice");
      return;
    }

    const invoice = await res.json();

    console.log("Invoice received:", invoice); // 👀 check browser console

    // ⭐ FILL ALL FIELDS NOW
    document.getElementById("invoice_number").value = invoice.invoice_number;
    document.getElementById("customer_id").value    = invoice.customer_id;
    document.getElementById("booking_id").value     = invoice.booking_id;
    document.getElementById("invoice_amount").value = invoice.invoice_amount;
    document.getElementById("status").value         = invoice.status;

    alert("Invoice loaded successfully ✏️");

    setTimeout(()=>{
      document.getElementById("invoice_number").focus();
    },400);

  }catch(err){
    console.error(err);
    alert("Cannot fetch invoice data. Is server running?");
  }
}
async function viewInvoiceReceipts(bookingId){

  const res = await fetch(`http://localhost:3001/api/invoice-receipts/${bookingId}`);
  const receipts = await res.json();

  let html = "<h2>📄 Invoice Receipts</h2>";

  if(receipts.length === 0){
    html += "<h3>No invoice receipts uploaded</h3>";
  }

  receipts.forEach((r,i)=>{
    html += `
      <div style="border:2px solid purple;margin:15px;padding:15px;border-radius:10px">
        <h3>Invoice Receipt ${i+1}</h3>
        <button onclick="openInvoicePDF('${r.receipt_file}')">
          Open Receipt
        </button>
      </div>
    `;
  });

  const win = window.open("", "_blank");
  win.document.write(html);
}

window.addEventListener("load", async () => {

  await fetch("http://localhost:3001/api/sync-invoice-refer");

  loadInvoiceTable();

});
async function handleUpload(bookingId) {
  console.log("Booking ID received:", bookingId);

  const fileInput = document.getElementById("receiptFileInput");
  fileInput.value = "";
  fileInput.click();

  fileInput.onchange = async function () {
    const file = fileInput.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("receipt", file);
    formData.append("booking_id", bookingId); // send booking_id to backend

    try {
      const res = await fetch(
        "http://localhost:3001/api/upload-invoice-receipt",
        {
          method: "POST",
          body: formData
        }
      );

      if (res.ok) {
        alert("✅ Receipt Uploaded Successfully");
        loadInvoiceTable(); // reload table with all previous + new receipts
      } else {
        alert("❌ Upload failed");
      }

    } catch (err) {
      console.error(err);
      alert("Server error");
    }
  };
}
