<!DOCTYPE html>
<html>
<head>
<title>Accessories Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#3a0ca3,#7209b7,#f72585);
color:white;
min-height:100vh;
}

h1{
text-align:center;
padding:15px;
}

.logout-btn {
  position:absolute;
  right:20px;
  top:20px;
  background:red;
  padding:10px 20px;
  border-radius:8px;
  color:white;
  font-weight:bold;
}

.container{
width:90%;
margin:auto;
background:white;
color:black;
padding:20px;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:15px;
padding:12px;
background:purple;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:purple;
color:white;
padding:10px;
}

td{
text-align:center;
padding:10px;
border-bottom:1px solid #ddd;
}
.viewBtn{
background:#3498db;
color:white;
border:none;
padding:6px 16px;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

.downloadBtn{
background:#2ecc71;
color:white;
border:none;
padding:6px 16px;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

.editBtn{
background:purple;
color:white;
border:none;
padding:6px 15px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Accessories Dashboard</h1>

<a href="#" class="logout-btn" id="logoutBtn">Logout</a>

<div class="container">

 <button id="addAccessoriesBtn"
onclick="showForm()"
style="padding:10px; font-size:20px; margin-bottom:20px; background:green; color:white; border:none; border-radius:10px; cursor:pointer;">
Add Accessories
</button>

<div id="formSection" style="display:none;">
<div class="grid">

<input id="accessories_number" type="number" placeholder="Accessories Number">

<input id="customer_id" type="number" placeholder="Customer ID">

<input id="booking_id" type="number" placeholder="Booking ID"
onchange="checkAccessories()">

<input id="accessories_amount" type="number" placeholder="Accessories Amount">



<input type="file" id="receipt">

</div>

<button id="saveBtn" onclick="saveAccessories()">Save Accessories</button>

</div>  


<div id="accessoriesTableSection" style="display:none;">


<h2>Customers Ready For Accessories</h2>

<table>

<tr>
<th>CUSTOMER ID</th>
<th>BOOKING ID</th>
<th>Status</th>
<th>Accessories Receipt</th>
<th>Action</th>
</tr>

<tbody id="accessoriesTableBody"></tbody>

</table>

</div>

</div>

<script>
const BASE_URL = "https://dealership-workflow-production.up.railway.app";
let editMode = false;
let editCustomerId = null;
let editBookingId = null;

function saveAccessories(){

let btn=document.getElementById("saveBtn");

let customerId=document.getElementById("customer_id").value;
let bookingId=document.getElementById("booking_id").value;
let accessoriesAmount=document.getElementById("accessories_amount").value;




let receipt=document.getElementById("receipt").files[0];

if(!customerId || !bookingId || !accessoriesAmount){
alert("Please fill all fields");
return;
}

btn.disabled=true;

let formData=new FormData();

formData.append("customer_id",customerId);
formData.append("booking_id",bookingId);
formData.append("accessories_amount",accessoriesAmount);


let accessoriesNumber = document.getElementById("accessories_number").value;
formData.append("accessories_number", accessoriesNumber);

if(receipt){
formData.append("receipt",receipt);
}

let url = editMode
? `${BASE_URL}/update-accessories`
: `${BASE_URL}/add-accessories`;

fetch(url,{
method:"POST",
body:formData
})
.then(res=>res.json())
.then(data=>{

btn.disabled=false;

console.log(data);

if(data.status === "booking_not_found"){
alert("Booking ID not found!");
return;
}

if(data.status === "customer_not_found"){
alert("Customer ID not found!");
return;
}

if(data.status === "not_matching"){
alert("Customer ID and Booking ID do not match!");
return;
}

if(data.status === "already_completed"){
alert("Accessories already completed!");
return;
}

if(data.status === "not_matching"){
alert("Customer ID and Booking ID do not match!");
return;
}

if(data.status === "already_completed"){
alert("Accessories already completed!");
return;
}



if(data.status === "success"){

alert(editMode ? "Accessories Updated Successfully" : "Accessories Saved Successfully");



editMode = false;

document.getElementById("saveBtn").innerText = "Save Accessories";

document.getElementById("customer_id").value="";
document.getElementById("booking_id").value="";
document.getElementById("accessories_number").value="";
document.getElementById("accessories_amount").value="";
document.getElementById("receipt").value="";

loadAccessories();

}

})
.catch(err=>{
btn.disabled=false;
console.log(err);
alert("Server error");
});

}

document.getElementById("logoutBtn").onclick = function(e){
e.preventDefault();
window.location.href="login.html";
}

window.onload = function(){
baseFinalAmount = 0;
loadAccessories();
}


function loadAccessories(){

fetch(`${BASE_URL}/get-accessories`)

.then(res=>res.json())

.then(data=>{
if(data.length === 0){
document.getElementById("accessoriesTableSection").style.display="none";
return;
}

document.getElementById("accessoriesTableSection").style.display="block";

let table=document.getElementById("accessoriesTableBody");

table.innerHTML="";

data.forEach(row => {
  console.log(row);

let statusColor = row.status === "Completed" ? "green" : "orange";

let tr = `
<tr>
<td>${row.customer_id}</td>
<td>${row.booking_id}</td>
<td style="color:${statusColor}">${row.status}</td>
<td>
<button class="viewBtn" onclick="viewReceipt('${row.receipt_file}')">View</button>
<button class="downloadBtn" onclick="downloadReceipt('${row.receipt_file}')">Download</button>
</td>
<td>
<button class="editBtn" onclick="editAccessories(${row.customer_id},${row.booking_id},'${row.accessories_number}','${row.accessories_amount}','${row.receipt_file}')">Edit</button>
</td>
</tr>
`;

table.innerHTML += tr;

});

});

}
function checkAccessories(){

let customerId = document.getElementById("customer_id").value;
let bookingId = document.getElementById("booking_id").value;

if(!customerId || !bookingId){
return;
}

fetch(`${BASE_URL}/api/check-accessories`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
customer_id:customerId,
booking_id:bookingId
})
})

.then(res=>res.json())

.then(data=>{

if(data.status === "booking_not_found"){
alert("Booking ID not found!");
}

if(data.status === "customer_not_found"){
alert("Customer ID not found!");
}

if(data.status === "not_matching"){
alert("Customer ID and Booking ID do not match!");
}

if(data.status === "already_completed"){
alert("Accessories already completed!");
}

})

.catch(err=>{
console.log(err);
});

}

function viewReceipt(file){

if(!file){
alert("No receipt uploaded");
return;
}

window.open(`${BASE_URL}/uploads/${file}`, "_blank");

}

function downloadReceipt(file){

if(!file){
alert("No receipt uploaded");
return;
}

let link=document.createElement("a");

link.href="${BASE_URL}/uploads/${file}";

link.download=file;

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

}

function editAccessories(customerId,bookingId,accNumber,amount,file){

editMode = true;

document.getElementById("customer_id").value = customerId;
document.getElementById("booking_id").value = bookingId;
document.getElementById("accessories_number").value = accNumber;
document.getElementById("accessories_amount").value = Number(amount);


document.getElementById("saveBtn").innerText = "Update Accessories";

}



function showForm(){

document.getElementById("formSection").style.display="block";
document.getElementById("accessoriesTableSection").style.display="none";

}
</script>

</body>
</html>
