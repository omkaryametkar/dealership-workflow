/* ⭐ Active Button Style */
.nav-btn.active{

}

.viewBox{

  margin-top:20px;

  padding:15px;
  border-radius:8px;
}
</style>
</head>

<script>
const BASE_URL = "https://dealership-workflow-production.up.railway.app";
  let payingDue = false;
  let payingRefund = false; 
function hideAllSections(){
  document.getElementById("addPaymentSection").style.display = "none";
  document.getElementById("pendingSection").style.display = "none";
  document.getElementById("completedSection").style.display = "none";
  document.getElementById("refundSection").style.display = "none";
  document.getElementById("dueSection").style.display = "none";  
  document.getElementById("viewBox").style.display = "none";
  document.getElementById("receiptContainer").style.display = "none";
  document.getElementById("transactionSection").style.display = "none";
  document.getElementById("otherSection").style.display = "none";
}

function showAddPayment(){
  hideAllSections();
  document.getElementById("addPaymentSection").style.display = "block";
}

function showPending(){
  hideAllSections();
  document.getElementById("pendingSection").style.display = "block";
  loadPendingPayments();
}

function showCompleted(){
  hideAllSections();
  document.getElementById("completedSection").style.display = "block";
  loadCompletedPayments();
}

function showRefunds(){
  hideAllSections();
  document.getElementById("refundSection").style.display = "block";
  loadRefunds();
}
function showDue(){
  hideAllSections();
  document.getElementById("dueSection").style.display = "block";
  loadDue();
}


let payments=[];
let currentBookingId=null;
/* 🔄 AUTO SYNC BOOKING → PAYMENT REFER */
function syncPayment(){
  return fetch(`${BASE_URL}/api/sync-payment`,{
    method:"POST"
  });
}
let editMode=false;
let bookingAmount=0;
let previousPaidTotal=0;
let originalRemaining=0;

/* ================= LOAD BOOKINGS ================= */

async function loadBookings() {
  const r = await fetch(`${BASE_URL}/api/bookings`);
  const data = await r.json();

  bookingTable.innerHTML = "";

  const unique = [];
  const map = new Map();

  for (const b of data) {
    if (!map.has(b.booking_id)) {
      map.set(b.booking_id, true);
      unique.push(b);
    }
  }

  unique.forEach(b => {

 let paidTotal = payments
  .filter(p => p.booking_id == b.booking_id)
  .reduce((sum, p) => sum + Number(p.amount_paid), 0);

let remaining = Number(b.total_amount) - (Number(b.booking_amount) + paidTotal);
if (remaining < 0) remaining = 0;


// ✅ DEFINE STATUS
let status = remaining === 0 ? "Completed" : "Pending";
    bookingTable.innerHTML += `
<tr>
  <td>${b.booking_id}</td>
  <td>${b.customer_name}</td>
  <td>${status}</td>
  <td>${b.customer_id}</td>
  <td>${b.booking_amount}</td>
  <td>${remaining.toFixed(2)}</td>
  <td>${b.total_amount}</td>

  
<td>

<button onclick="viewReceipts(${b.booking_id})"
 style="background:#2a9d8f;color:white;margin-right:5px;">
 View Receipts
</button>

<button onclick="uploadForLatestPayment(${b.booking_id})">
 Upload New
</button>

<input type="file"
       id="receipt_${b.booking_id}"
       style="display:none"
       onchange="uploadPaymentReceipt(${b.booking_id})">

</td>
  <td>
    <button onclick="viewBooking(${b.customer_id})">View</button>
    <button onclick="editBooking(${b.customer_id})"
      style="background:#fca311;margin-left:5px;">Edit</button>
  </td>
</tr>
`;
  });
}
async function loadTransactionDetails(){

  const r = await fetch(`${BASE_URL}/api/bookings`);
  const bookings = await r.json();

  let html = `
    <h3>💳 Transaction Details</h3>
    <table border="1" width="100%">
      <tr>
        <th>Booking ID</th>
        <th>Customer ID</th>
        <th>Customer Name</th>
        <th>Action</th>
      </tr>
  `;

  bookings.forEach(b => {
    html += `
      <tr>
        <td>${b.booking_id}</td>
        <td>${b.customer_id}</td>
        <td>${b.customer_name}</td>
        <td>
  <button onclick="viewTransaction(${b.customer_id})"
    style="background:#2a9d8f;color:white;margin-right:5px;">
    View
  </button>

  <button onclick="downloadTransaction(${b.customer_id})"
    style="background:#e63946;color:white;">
    Download
  </button>
</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("transactionSection").innerHTML = html;
}

async function loadPayments(){
  const r=await fetch(`${BASE_URL}/api/payments`);
  payments=await r.json();
  // loadBookings();
}
// loadPayments();

async function checkCustomerExist(){

  let customerId = cid.value.trim();
  if(!customerId) return false;

const r = await fetch(`${BASE_URL}/api/customer-booking/${customerId}`);

  if(r.status !== 200){
    alert("Customer not exist");
    return false;
  }

  const b = await r.json();

  currentBookingId = b.booking_id;

  // TOTAL AMOUNT
  total.value = Number(b.total_amount).toFixed(2);

  // BOOKING AMOUNT
  bookingAmount = Number(b.booking_amount || 0);
  booking.value = bookingAmount.toFixed(2);

  // ⭐ TOTAL PAYMENT (50% - booking)
  const totalPaymentAmount =
  (Number(b.total_amount) * 0.5) - bookingAmount;

  document.getElementById("totalPayment").value =
  totalPaymentAmount.toFixed(2);

  // ⭐ GET ALREADY PAID AMOUNT FROM BACKEND
  const payRes = await fetch(`${BASE_URL}/api/payment-history/${b.booking_id}`);
  const payData = await payRes.json();

  previousPaidTotal = payData.total_paid || 0;
  originalRemaining = totalPaymentAmount - previousPaidTotal;

  // ⭐ CALCULATE REMAINING
  let remainingAmt = totalPaymentAmount - previousPaidTotal;

  if (remainingAmt < 0) remainingAmt = 0;

  remaining.value = remainingAmt.toFixed(2);

  // ⭐ IF PAYMENT COMPLETED
  if(!payingDue && remainingAmt === 0){
    alert("Payment already completed for this booking");
    document.getElementById("paid").disabled = true;
  }else{
    document.getElementById("paid").disabled = false;
  }

  return true;
}
function loadPaymentData(bookingId){

fetch(`${BASE_URL}/api/get-payment-summary/${bookingId}`)
.then(res => res.json())
.then(data => {

document.getElementById("total").value = data.total_amount;

// ⭐ USE BACKEND VALUE
document.getElementById("totalPayment").value = data.total_payment;

// ⭐ IMPORTANT FIX
document.getElementById("remaining").value = data.remaining_amount;

// ⭐ STORE VALUES
bookingAmount = data.booking_amount;
previousPaidTotal = data.paid_amount;

});

}
async function loadOtherList(){

  const r = await fetch(`${BASE_URL}/api/get-other-list`);
  const data = await r.json();

  let html = `
  <h3>➕ Other Amount Section</h3>

  <table border="1" width="100%">
  <tr>
    <th>Booking ID</th>
    <th>Customer ID</th>
    <th>Status</th>
    <th>Action</th>
  </tr>
  `;

  data.forEach(o => {

    if(o.status === "Pending"){

      html += `
      <tr>
        <td>${o.booking_id}</td>
        <td>${o.customer_id}</td>
        <td>${o.status}</td>
        <td>
          <button onclick="openOtherForm('${o.customer_id}', '${o.booking_id}')"
          style="background:#2a9d8f;color:white;">
            Add Amount
          </button>
        </td>
      </tr>
      `;
    }

  });

  html += "</table>";

  document.getElementById("otherSection").innerHTML = html;
}
function calcFinalAmount(){

  const base = Number(document.getElementById("baseAmt").value) || 0;
  const other = Number(document.getElementById("otherAmt").value) || 0;

  const final = base + other;

  document.getElementById("finalAmt").value = final.toFixed(2);
}
async function openOtherForm(customerId, bookingId){

  const res = await fetch(
    `${BASE_URL}/api/get-other-details/${customerId}/${bookingId}`
  );

  const data = await res.json();

  const baseAmount = Number(data.baseAmount || 0);
  const vehicleTotal = Number(data.total_amount || 0);

  const html = `
  <h3>➕ Other Amount Entry</h3>

  <div class="grid">

    <div>
      <div class="label">Customer ID</div>
      <input id="otherCid" value="${customerId}" readonly>
    </div>

    <div>
      <div class="label">Booking ID</div>
      <input id="otherBid" value="${bookingId}" readonly>
    </div>

    <div>
      <div class="label">Base Amount</div>
      <input id="baseAmt" value="${baseAmount}" readonly>
    </div>

    <div>
      <div class="label">Vehicle Total</div>
      <input value="${vehicleTotal}" readonly>
    </div>

    <div>
      <div class="label">Other Amount</div>
      <input id="otherAmt" type="number" oninput="calcFinalAmount()">
    </div>

    <div>
      <div class="label">Final Amount</div>
      <input id="finalAmt" readonly>
    </div>

  </div>

  <br>

  <button onclick="saveOtherAmountFinal()">Submit</button>
  <button onclick="loadOtherList()" style="background:red;color:white;">
    Cancel
  </button>
  `;

  document.getElementById("otherSection").innerHTML = html;

  // initialize
  document.getElementById("finalAmt").value = baseAmount.toFixed(2);
}
async function saveOtherAmountFinal(){

  const customerId = document.getElementById("otherCid").value;
  const bookingId = document.getElementById("otherBid").value;
  const otherAmt = document.getElementById("otherAmt").value;

  if(!otherAmt){
    alert("Enter Other Amount");
    return;
  }

  const res = await fetch(`${BASE_URL}/api/save-other-amount`,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      customer_id: customerId,
      booking_id: bookingId,
      other_amount: otherAmt
    })
  });

  const data = await res.json();

  if(data.status === "refund"){
    alert("Refund: " + data.refund_amount);
  }
  else if(data.status === "due"){
    alert("Due: " + data.due_amount);
  }
  else{
    alert("Moved to Delivery");
  }

  loadOtherList();
}
function calcRemaining(){

  const totalPayment =
  Number(document.getElementById("totalPayment").value) || 0;

  const paidNow =
  Number(document.getElementById("paid").value) || 0;

  // ⭐ NEW TOTAL PAID (PREVIOUS + CURRENT)
  const newPaidTotal = previousPaidTotal + paidNow;

  let remainingAmt = totalPayment - newPaidTotal;

  if(remainingAmt < 0){
    remainingAmt = 0;
  }

  document.getElementById("remaining").value =
  remainingAmt.toFixed(2);

}
async function loadPendingPayments() {

  const r = await fetch(`${BASE_URL}/api/payment-reference`);
  const data = await r.json();

  // ⭐ get booking status
  const b = await fetch(`${BASE_URL}/api/bookings`);
  const bookings = await b.json();

  let rows = "";

  data.forEach(p => {

    // find booking
    const booking = bookings.find(bk => bk.booking_id == p.booking_id);

    // ⭐ hide cancelled bookings
    if(p.status === "Pending" && booking?.booking_status !== "Cancelled"){

      rows += `
      <tr>
      <td>${p.booking_id}</td>
      <td>${p.customer_name}</td>
      <td>${p.status}</td>
      <td>${p.customer_id}</td>
      <td>${Number(p.booking_amount).toFixed(2)}</td>
      <td>${Number(p.remaining_amount).toFixed(2)}</td>
      <td>${Number(p.total_amount).toFixed(2)}</td>
      <td>${Number(p.total_payment).toFixed(2)}</td>
      </tr>
      `;

    }

  });

  bookingTable.innerHTML = rows;
}
async function savePayment(){

  const ok = await checkCustomerExist();
  if(!ok) return;

  if(!paid.value){
    alert("Enter amount paid");
    return;
  }

  try{

    const res = await fetch(`${BASE_URL}/api/add-payment`,{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        customer_id: cid.value,
        booking_id: currentBookingId,
        total_amount: total.value,
        amount_paid: Number(paid.value),
        payment_mode: mode.value,
        payment_date: date.value,
        paying_due: payingDue
      })
    });

    if(!res.ok){
      const txt = await res.text();
      console.error("Server Error:", txt);
      alert("Server Error while saving payment");
      return;
    }

    const data = await res.json();

    if(data.error){
      alert("Error: " + JSON.stringify(data.error));
      return;
    }

    alert("✅ Payment Saved Successfully!");

    /* ⭐ REFUND COMPLETE API */
    if(payingRefund){

      await fetch(`${BASE_URL}/api/complete-refund`,{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          customer_id: cid.value,
          booking_id: currentBookingId
        })
      });

      payingRefund = false;

      alert("💰 Refund Completed Successfully");
    }

    payingDue = false;

    document.getElementById("paid").value = "";

    await loadPayments();
    await checkCustomerExist();
    await loadBookings();

    loadPaymentData(currentBookingId);

    calcRemaining();

  }
  catch(err){
    console.error("Save Payment Error:", err);
    alert("Server connection error");
  }

}

function logout(){
  window.location.href = "login.html";
}


/* ✏️ EDIT BOOKING (FILL PAYMENT FORM) */
async function editBooking(customerId){

  try{
    const r = await fetch(`${BASE_URL}/api/customer-booking/${customerId}`);

    if(r.status !== 200){
      alert("Customer not found");
      return;
    }

    const b = await r.json();

    // ⭐ FILL ALL OLD DETAILS IN FORM
    document.getElementById("cid").value = b.customer_id;
    document.getElementById("total").value = b.total_amount;
    document.getElementById("booking").value = b.booking_amount;
    document.getElementById("remaining").value = b.remaining_amount;

    currentBookingId = b.booking_id;
    bookingAmount = Number(b.booking_amount);

    // Scroll to top form
    window.scrollTo({ top: 0, behavior: "smooth" });

    // Cursor focus on Amount Paid
    setTimeout(() => {
      document.getElementById("paid").value = "";
      document.getElementById("paid").disabled = false;
      document.getElementById("paid").focus();
    }, 400);

    alert("All previous details loaded. Add next payment 💰");

  }catch(err){
    console.error(err);
    alert("Server error while loading data");
  }
}

document.addEventListener("DOMContentLoaded", function(){
  window.bookingTable = document.getElementById("bookingTable");
loadPayments();
  const buttons = document.querySelectorAll(".nav-btn");

  buttons.forEach(btn => {
    btn.addEventListener("click", function(){

      buttons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      const section = btn.getAttribute("data-section");
      hideAllSections();

      if(section === "addPayment"){
        showAddPayment();
      }
      else if(section === "pending"){
        showPending();
      }
      else if(section === "completed"){
        showCompleted();
      }
      else if(section === "refund"){
        showRefunds();
      }
      else if(section === "due"){
  showDue();
}
      else if(section === "documents"){
    hideAllSections();
    document.getElementById("receiptContainer").style.display = "block";
    loadDocumentsTable();
}
else if(section === "transaction"){
    hideAllSections();
    document.getElementById("transactionSection").style.display = "block";
    loadTransactionDetails();
}
else if(section === "other"){
  hideAllSections();
  document.getElementById("otherSection").style.display = "block";
  loadOtherList();
}

    });
  });

});
async function savePaymentReference(b) {
  await fetch(`${BASE_URL}/api/save-payment-reference`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      booking_id: b.booking_id,
      customer_name: b.customer_name,
      status: b.booking_status,
      customer_id: b.customer_id,
      booking_amount: b.booking_amount,
      remaining_amount: b.remaining_amount,
      total_amount: b.total_amount
    })
  });
}

  let html = `

                padding:20px; border-radius:10px; 
                box-shadow:0 3px 10px rgba(0,0,0,0.2);">

      <h3 style="padding:10px; margin-bottom:15px; color:#4b0082;">
        📄 Documents List
      </h3>

      <table style="
            width:100%;
            border-collapse: collapse;
            font-size:14px;
            text-align:center;
            border:1px solid #ccc;">
        <thead>
          <tr style="background:#4b0082; color:white; height:45px;">
            <th style="padding:10px;">Customer ID</th>
            <th style="padding:10px;">Booking ID</th>

function togglePDF(fileName, divId){

  const div = document.getElementById(divId);

  if(div.style.display === "none"){
    
    div.style.display = "block";
    div.innerHTML = `
      <iframe 
        src="${BASE_URL}/uploads/${fileName}" 
        width="100%" 
        height="500px">
      </iframe>
      <br><br>
      <button onclick="togglePDF('${fileName}','${divId}')">❌ Close Receipt</button>
    `;

  }else{
    div.style.display = "none";
    div.innerHTML = "";
  }

}

 data.forEach(b => {

     .filter(p => p.customer_id == b.customer_id)
      .reduce((sum, p) => sum + Number(p.amount_paid), 0);

async function completeRefund(customerId, bookingId){

  if(!confirm("Confirm refund completed?")) return;

  const res = await fetch(`${BASE_URL}/api/complete-refund`,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      customer_id: customerId,
      booking_id: bookingId
    })
  });

  const data = await res.json();

  if(data.success){
    alert("Refund completed. Customer moved to Delivery.");
    loadRefunds();
  }else{
    alert("Error processing refund");
  }

}
async function goToPayment(customerId){

  payingDue = true;   // ⭐ IMPORTANT

  showAddPayment();

  document.getElementById("cid").value = customerId;

  const bookingRes = await fetch(`${BASE_URL}/api/customer-booking/${customerId}`);
  const booking = await bookingRes.json();

  document.getElementById("total").value = Number(booking.total_amount).toFixed(2);
  document.getElementById("booking").value = Number(booking.booking_amount).toFixed(2);

  currentBookingId = booking.booking_id;

  const r = await fetch(`${BASE_URL}/api/account-status`);
  const data = await r.json();

  const dueCustomer = data.find(d => 
    d.customer_id == customerId && d.type === "Due"
  );

  if(!dueCustomer){
    alert("Due record not found");
    return;
  }

  const dueAmount = Number(dueCustomer.amount);

  document.getElementById("totalPayment").value = dueAmount.toFixed(2);
  document.getElementById("remaining").value = dueAmount.toFixed(2);

  document.getElementById("paid").value = "";
}

async function goToRefund(customerId){
 payingRefund = true; 
  showAddPayment();

  document.getElementById("cid").value = customerId;

  const bookingRes =
  await fetch(`${BASE_URL}/api/customer-booking/${customerId}`);

  const booking = await bookingRes.json();

  document.getElementById("total").value =
  Number(booking.total_amount).toFixed(2);

  document.getElementById("booking").value =
  Number(booking.booking_amount).toFixed(2);

  currentBookingId = booking.booking_id;

  const r = await fetch(`${BASE_URL}/api/account-status`);
  const data = await r.json();

  const refundCustomer = data.find(d =>
    d.customer_id == customerId && d.type === "Refund"
  );

  let refundAmount;

  if(!refundCustomer){

    // ⭐ NEW LOGIC (AUTO CALCULATE REFUND)
    const payRes =
    await fetch(`${BASE_URL}/api/payment-history/${booking.booking_id}`);

    const payData = await payRes.json();

    const totalPaid = Number(payData.total_paid || 0);

    refundAmount = totalPaid + Number(booking.booking_amount);

  }else{

    refundAmount = Number(refundCustomer.amount);

  }

  // ⭐ AUTO FILL REFUND AMOUNT
  document.getElementById("totalPayment").value =
  refundAmount.toFixed(2);

  document.getElementById("remaining").value =
  refundAmount.toFixed(2);

  document.getElementById("paid").value = "";

}
