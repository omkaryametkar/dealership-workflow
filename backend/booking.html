<!DOCTYPE html>
<html>
<head>
  <title>Booking Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#3a0ca3,#7209b7,#f72585);
      color: white;
    }

    h1 { 
      text-align: center; 
      margin-top: 20px;
      position: relative;
    }

    .logout-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      background: red;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .container {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      margin: auto;
      margin-top: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    input, select {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      background: #7209b7;
      margin-top: 10px;
    }
    .uploadBtn{
  background: orange;
}

.viewBtn{
  background: #16a34a;
}

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }

    .modal, .cancelModal {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.5);
    }
.form-grid div {
  display: flex;
  flex-direction: column;
}
    .modal-content {
      background: white;
      color: black;
      margin: 10% auto;
      padding: 20px;
      border-radius: 10px;
      width: 50%;
    }

    .close-btn {
      float: right;
      font-size: 18px;
      cursor: pointer;
      color: red;
      font-weight: bold;
    }

    .view-grid div { margin-bottom: 10px; }
    .view-grid b { display: inline-block; width: 150px; }
  </style>
</head>
<body>

<h1>Booking Dashboard</h1>
<button class="logout-btn" onclick="logout()">Logout</button>

<div class="container">

  <button id="addBookingBtn"
style="padding:10px; font-size:20px; margin-bottom:20px; background:green; color:white; border:none; border-radius:10px; cursor:pointer;">
New Booking
</button>

  </button>

  <!-- HIDDEN FORM -->
  <div id="bookingForm" style="display:none;">

    <input id="booking_id" hidden>

    <div class="form-grid">

      <input id="customer_id" placeholder="Customer ID">
      <input id="customer_name" placeholder="Customer Name">

      <input id="mobile_number" placeholder="Mobile Number">
      <input id="vehicle_model" placeholder="Vehicle Model">

      <input id="booking_date" type="date">
      <input id="booking_amount" placeholder="Booking Amount">

      <input id="total_amount" placeholder="Total Amount">
      <select id="booking_status">
        <option>Completed</option>
      </select>

      <div>
        <label>Choose Aadhaar Card</label>
        <input type="file" id="aadhaar_file" accept=".pdf,.jpg,.jpeg,.png">
      </div>

      <div>
        <label>Choose PAN Card</label>
        <input type="file" id="pan_file" accept=".pdf,.jpg,.jpeg,.png">
      </div>

      <div>
        <label>Upload Your Booking Receipt</label>
        <input type="file" id="receipt_file" accept=".pdf,.jpg,.jpeg,.png">
      </div>

    </div>

    <button onclick="saveBooking()">Save Booking</button>
  </div>

  <div style="margin-top: 20px;">
    <input id="view_booking_id" placeholder="Enter Booking ID to View">
    <button onclick="viewBookingById()">View Booking</button>
  </div>

  <table>
   <thead>
  <tr>
    <th>ID</th>
    <th>Customer</th>
    <th>Status</th>
    <th>Customer ID</th>
    <th>Aadhaar</th>
<th>PAN</th>
<th>Booking Receipt</th>
<th>Actions</th>

  </tr>
</thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>


<!-- VIEW MODAL -->
<div id="viewModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">×</span>
    <h2>Booking Details</h2>
    <div class="view-grid" id="viewContent"></div>
  </div>
</div>

<!-- CANCEL MODAL -->
<div id="cancelModal" class="cancelModal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeCancelModal()">×</span>
    <h2>Cancel Booking</h2>

    <label>Reason for Cancellation:</label>
    <input type="text" id="cancelReason" style="width:100%; margin-bottom:10px;">

    <label>Bank Details:</label>
    <input type="text" id="bankDetails" style="width:100%; margin-bottom:10px;">

    <button onclick="submitCancellation()">Submit</button>
  </div>
</div>

<!-- UPLOAD DOCUMENT MODAL -->
<div id="uploadModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeUploadModal()">×</span>
    <h2>Upload Document</h2>

    <!-- Aadhaar Upload -->
    <div id="aadhaarUploadBox" style="display:none">
      <label>Aadhaar:</label>
      <input type="file" id="upload_aadhaar">
    </div>

    <!-- PAN Upload -->
    <div id="panUploadBox" style="display:none">
      <label>PAN:</label>
      <input type="file" id="upload_pan">
    </div>
    <!-- Receipt Upload -->
<div id="receiptUploadBox" style="display:none">
  <label>Booking Receipt:</label>
  <input type="file" id="upload_receipt">
</div>


   <button onclick="uploadDocs()">Upload</button>
  </div>
</div>

<script>
 const BASE_URL = "https://dealership-workflow-production.up.railway.app";
window.onload = function () {

  // After login, you will NOT have booking_id yet (because user hasn't saved booking)
  // So ONLY start TAT if booking already exists (update mode)

  const savedCustomerId = localStorage.getItem("customer_id");
  const savedBookingId = localStorage.getItem("booking_id");

  // If coming for a NEW BOOKING → do NOT start
  if (!savedCustomerId || !savedBookingId) {
    console.log("New booking → start time will be recorded after Save");
    return;
  }

  // For UPDATE mode → Start TAT now
  fetch(`${BASE_URL}/api/start-department`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      customer_id: savedCustomerId,
      booking_id: savedBookingId,
      department: "Sales"
    })
  })
  .then(() => console.log("Sales Start Time Recorded"))
  .catch(err => console.log("Start TAT error:", err));
};
function closeUploadModal() {
  document.getElementById("uploadModal").style.display = "none";
}
  
  let cancelBookingId = null;

  loadBookings();
async function saveBooking() {
  // 🔍 CHECK IF CUSTOMER ID ALREADY EXISTS BEFORE SAVING
const checkRes = await fetch(`${BASE_URL}/api/bookings`);
const allBookings = await checkRes.json();

const exists = allBookings.some(b => b.customer_id == customer_id.value);

// If ADDING new booking (not update)
if (!booking_id.value && exists) {
  alert("Customer ID already exists ❌");
  return; // STOP SAVING
}

  const formData = new FormData();

  formData.append("customer_id", customer_id.value);
  formData.append("customer_name", customer_name.value);
  formData.append("mobile_number", mobile_number.value);
  formData.append("vehicle_model", vehicle_model.value);
  formData.append("booking_date", booking_date.value);
  formData.append("booking_amount", booking_amount.value);
  formData.append("total_amount", total_amount.value);
  formData.append("booking_status", booking_status.value);

  const aadhaarFile = aadhaar_file.files[0];
  const panFile = pan_file.files[0];
  const receiptFile = receipt_file.files[0];

  if (aadhaarFile) formData.append("aadhaar_file", aadhaarFile);
  if (panFile) formData.append("pan_file", panFile);
  if (receiptFile) formData.append("receipt_file", receiptFile);

  try {

    let finalBookingId;

    // UPDATE
    if (booking_id.value) {
      const res = await fetch(`${BASE_URL}/api/update-booking/${booking_id.value}`, {
        method: "PUT",
        body: formData
      });

      const result = await res.json();

      if (!res.ok) {
        alert(result.message);
        return;
      }

      finalBookingId = booking_id.value;

      alert("Booking Updated Successfully ✅");
    }
    // ADD NEW
    else {
      const res = await fetch(`${BASE_URL}/api/add-booking`, {
        method: "POST",
        body: formData
      });

      const result = await res.json();

      if (!res.ok) {
        alert(result.message);
        return;
      }

      finalBookingId = result.bookingId;  // SAFE

      alert("Booking Added Successfully ✅");
    }
// 🔥 Only call department APIs if BookingId exists
if (finalBookingId) {

  await fetch(`${BASE_URL}/api/end-department`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      customer_id: customer_id.value,
      booking_id: finalBookingId,
      department: "Sales"
    })
  });

  // ✅ STEP 4 — Clear Saved IDs (IMPORTANT)
  localStorage.removeItem("customer_id");
  localStorage.removeItem("booking_id");

}

    clearForm();
    loadBookings();

  } catch (err) {
    console.error(err);
    alert("Server Error ❌");
  }
}
async function loadBookings() {

  const res = await fetch(`${BASE_URL}/api/bookings`);
  if (!res.ok) {
  const text = await res.text();
  console.error(text);
  alert("Server error while uploading");
  return;
}

const data = await res.json();


  let html = "";

  data.forEach(b => {

    let status = b.booking_status || b.status || "N/A";

    // ===== Aadhaar Button =====
let aadhaarBtn = "";

if (b.aadhaar_file && b.aadhaar_file !== "null") {
  aadhaarBtn = `
    <button class="viewBtn"
      onclick="viewDocument('${b.aadhaar_file}')">
      View
    </button>`;
} 


// ===== PAN Button =====
let panBtn = "";

if (b.pan_file && b.pan_file !== "null") {
  panBtn = `
    <button class="viewBtn"
      onclick="viewDocument('${b.pan_file}')">
      View
    </button>`;
} 


// ===== Receipt Button =====
let receiptBtn = "";

if (b.receipt_file && b.receipt_file !== "null") {
  receiptBtn = `
    <button class="viewBtn"
      onclick="viewDocument('${b.receipt_file}')">
      View
    </button>`;
}
    html += `
      <tr>
        <td>${b.booking_id}</td>
        <td>${b.customer_name}</td>
        <td>${status}</td>
        <td>${b.customer_id}</td>
        <td>${aadhaarBtn}</td>
<td>${panBtn}</td>
<td>${receiptBtn}</td>
<td>

  <button onclick="showModalById(${b.booking_id})">View</button>

  <button style="background:blue" onclick="downloadReceipt(${b.booking_id})">
    Download Receipt
  </button>

 <button 
  style="background:red" 
  onclick="openCancelBox(${b.customer_id}, '${b.invoice_status}')">
  Cancel
</button>

  
</td>


      </tr>
    `;
  });

  document.getElementById("tableBody").innerHTML = html;
}

function showModalById(id) {

  fetch(`${BASE_URL}/api/bookings`)
    .then(res => res.json())
    .then(data => {

      const b = data.find(item => item.booking_id == id);

      if (!b) {
        alert("Booking not found");
        return;
      }

      showModal(b);
    });
}



 function showModal(b) {

let bookingDate = "N/A";

if (b.booking_date) {
  try {
    bookingDate = new Date(b.booking_date).toISOString().split("T")[0];
  } catch (err) {
    bookingDate = "N/A";
  }
}

let cancelSection = "";

// Show cancel details ONLY if booking is cancelled
if (b.cancel_reason) {
  cancelSection = `
  <div>
    <h3 style="color:red">Cancellation Details</h3>
    <div><b>Reason:</b> ${b.cancel_reason}</div>
    <div><b>Bank Details:</b> ${b.cancel_bank}</div>
  </div>
  `;
}

const content = `

<div style="display:grid; grid-template-columns:1fr 1fr; gap:30px">

  <div>
    <h3>Booking Details</h3>
    <div><b>Booking ID:</b> ${b.booking_id || "N/A"}</div>
    <div><b>Customer ID:</b> ${b.customer_id || "N/A"}</div>
    <div><b>Customer Name:</b> ${b.customer_name || "N/A"}</div>
    <div><b>Mobile Number:</b> ${b.mobile_number || "N/A"}</div>
    <div><b>Vehicle Model:</b> ${b.vehicle_model || "N/A"}</div>
    <div><b>Booking Date:</b> ${bookingDate}</div>
    <div><b>Booking Amount:</b> ₹${b.booking_amount || 0}</div>
    <div><b>Total Amount:</b> ₹${b.total_amount || 0}</div>
    <div><b>Status:</b> ${b.booking_status || "N/A"}</div>
  </div>

  ${cancelSection}

</div>

`;

document.getElementById("viewContent").innerHTML = content;
document.getElementById("viewModal").style.display = "block";
}

  function closeModal() {
    document.getElementById("viewModal").style.display = "none";
  }

  async function viewBookingById() {
    const id = document.getElementById("view_booking_id").value;
    if (!id) return alert("Please enter a Booking ID");

    const res = await fetch(`${BASE_URL}/api/bookings`);
    const data = await res.json();
    const b = data.find(item => item.booking_id == id);

    if (!b) return alert("Booking ID not found");

    showModal(b);
  }

  function clearForm() {
    document.querySelectorAll("input").forEach(i => i.value = "");
    booking_id.value = "";
  }




  function logout() {
    window.location.href = "login.html";
  }

  
let selectedBookingId = null;

function openUploadModal(bookingId, docType) {

  selectedBookingId = bookingId;

  
  document.getElementById("uploadModal").style.display = "block";

  
  document.getElementById("aadhaarUploadBox").style.display = "none";
  document.getElementById("panUploadBox").style.display = "none";
   document.getElementById("receiptUploadBox").style.display = "none";

  
  if(docType === "aadhaar"){
    document.getElementById("aadhaarUploadBox").style.display = "block";
  }

  if(docType === "pan"){
    document.getElementById("panUploadBox").style.display = "block";
  }
  if (docType === "receipt") {
  document.getElementById("receiptUploadBox").style.display = "block";
}

}

function closeUploadModal(){
  document.getElementById("uploadModal").style.display = "none";
}
async function uploadDocs() {
  const formData = new FormData();

  const aadhaarFile = document.getElementById("upload_aadhaar").files[0];
  const panFile = document.getElementById("upload_pan").files[0];
  const receiptFile = document.getElementById("upload_receipt").files[0];

  if (!aadhaarFile && !panFile && !receiptFile) {
    alert("Please choose a file first");
    return;
  }

  if (aadhaarFile) formData.append("aadhaar_file", aadhaarFile);
  if (panFile) formData.append("pan_file", panFile);
  if (receiptFile) formData.append("receipt_file", receiptFile);

  try {
    const res = await fetch(`${BASE_URL}/api/upload-documents/${selectedBookingId}`, {
      method: "POST",
      body: formData
    });

    if (!res.ok) {
      const text = await res.text();
      console.error("SERVER ERROR:", text);
      alert("Upload failed. Check server terminal.");
      return;
    }

    const data = await res.json();
    alert(data.message);

    closeUploadModal();

    // 🔹 RELOAD BOOKINGS AFTER UPLOAD COMPLETES
    await loadBookings();  

  } catch (err) {
    console.error(err);
    alert("Network error ❌");
  }
}


 function openCancelBox(customerId, invoiceStatus) {

  if (invoiceStatus === "Completed") {
    alert("Customer has already completed the invoice. Booking cannot be cancelled.");
    return;
  }

  cancelBookingId = customerId;
  document.getElementById("cancelModal").style.display = "block";
}

  function closeCancelModal() {
    document.getElementById("cancelModal").style.display = "none";
  }

  async function submitCancellation() {

  const reason = document.getElementById("cancelReason").value;
  const bank_details = document.getElementById("bankDetails").value;

  if (!reason || !bank_details) {
    alert("Please enter both reason and bank details");
    return;
  }

  const res = await fetch(`${BASE_URL}/api/cancel-booking`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      customer_id: cancelBookingId,   
      reason: reason,
      bank_details: bank_details
    })
  });

  const data = await res.json();

  if (data.success) {
    alert("Booking Cancelled Successfully");
    closeCancelModal();
    loadBookings();  // reload table → shows Cancelled
  } else {
    alert("Cancellation failed!.Customer already completed the invoice");
  }
}
function downloadReceipt(bookingId) {
  window.open(`${BASE_URL}/api/download-receipt/${bookingId}`, "_blank");
}
function viewDocument(filename){

  if(!filename){
    alert("No document uploaded");
    return;
  }

  const fileUrl = `${BASE_URL}/uploads/${filename}`;

  window.open(fileUrl, "_blank");   // open in new tab

}


document.getElementById("customer_id").addEventListener("input", async function () {
  
  const enteredId = this.value.trim();
  if (enteredId === "") return;


  const res = await fetch(`${BASE_URL}/api/bookings`);
  const data = await res.json();

  // Check existing ID
  const exists = data.some(b => b.customer_id == enteredId);

  if (exists) {
    alert("Customer ID already exists ❌");
    this.value = "";  
  }
});

document.getElementById("addBookingBtn").addEventListener("click", function() {
  
  document.getElementById("bookingForm").style.display = "block";

 
  this.style.display = "none";

  
  document.querySelector("table").style.display = "none";
  document.getElementById("view_booking_id").style.display = "none";
  document.querySelector("div[style*='margin-top: 20px']").style.display = "none";
});
</script>
</body>
</html>
